<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <meta name="HandheldFriendly" content="true" />
    <title>Ploom Friends Program</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="logo-wrapper">
        <img
          class="logo"
          src="./assets/images/logo.png"
          alt="Ploom"
          width="96"
        />
      </div>

      <div class="change-email-form">
        <img
          src="./assets/images/banner.png"
          alt="Ploom Friends Program banner - 40% reducere la un cartus For Ploom per comanda, perioada 11 mai - 21 iulie 2026"
        />
        <div class="ce-form-wrapper">
          <form
            name="changeEmailForm"
            id="changeEmailForm"
            action=""
            novalidate
          >
            <p class="ce-form-text">
              Lorem ipsum dolor sit amet consectetur. Lectus eget.
            </p>
            <div class="ce-field-outter-wrapper ce-field-outter-margin">
              <label class="ce-input-label" for="fullName"
                >Selecteaza nume si prenume</label
              >
              <div class="ce-field-wrapper">
                <select
                  class="ce-select-field"
                  id="fullName"
                  name="fullName"
                  required
                  aria-describedby="fullNameError"
                >
                  <option value="" disabled selected hidden>
                    Nume Prenume
                  </option>
                  <option value="ion-popescu">Ion Popescu</option>
                  <option value="maria-ionescu">Maria Ionescu</option>
                  <option value="andrei-vasilescu">Andrei Vasilescu</option>
                  <option value="elena-dumitrescu">Elena Dumitrescu</option>
                  <option value="mihai-georgescu">Mihai Georgescu</option>
                </select>
                <img
                  class="ce-select-arrow"
                  src="./assets/images/ic-chevron-down.svg"
                  alt=""
                  aria-hidden="true"
                />
              </div>
              <p class="color-error" id="fullNameError">Selectează un nume</p>
            </div>

            <div class="ce-field-outter-wrapper">
              <label class="ce-input-label" for="email"
                >Completeaza cu adresa de email folosita in crearea contului pe
                ploom.ro</label
              >
              <div class="ce-field-wrapper" id="emailFieldWrapper">
                <input
                  class="ce-input-field"
                  type="email"
                  id="email"
                  name="email"
                  placeholder="user@email.com"
                  required
                  autocomplete="email"
                  aria-describedby="emailError"
                />
                <img
                  class="ce-field-icon"
                  src="./assets/images/ic-mail.svg"
                  alt="Email icon"
                  width="18"
                  height="18"
                />
              </div>
            </div>

            <p class="color-error" id="emailError">
              Adresa de email introdusă nu este validă
            </p>
            <div class="ce-form-checks">
              <div class="ce-form-checks-row">
                <input type="checkbox" id="checkAge" name="checkAge" required />
                <label for="checkAge"
                  >Declar că am peste 18 ani și sunt consumator de produse care
                  conțin nicotină.</label
                >
              </div>

              <div class="ce-form-checks-row">
                <input
                  type="checkbox"
                  id="checkInfoOwn"
                  name="checkInfoOwn"
                  required
                />
                <label for="checkInfoOwn"
                  >Declar pe propria răspundere că informațiile furnizate sunt
                  corecte, complete și îmi aparțin.</label
                >
              </div>

              <div class="ce-form-checks-row">
                <input
                  type="checkbox"
                  id="checkPersonalUse"
                  name="checkPersonalUse"
                  required
                />
                <label for="checkPersonalUse"
                  >Inteleg că acest cod este destinat exclusiv uzului personal
                  și poate fi utilizat doar de angajații JTI eligibili.</label
                >
              </div>
            </div>
            <button class="button btn-action" type="submit" name="submit">
              Trimite
            </button>
          </form>
        </div>
      </div>
    </div>
    <footer class="footer">
      <div class="container-small footer-inner">
        <p class="footer-text">
          Ploom Romania © 2026 / JT International (Romania) SRL Dimitrie Pompei
          9-9A, sect 2, Bucuresti <span>/</span>
        </p>
        <ul class="footer-links">
          <li><a href="#" title="">021 204 3111</a></li>
          <li><a href="#" title="">Regulament</a></li>
          <li><a href="#" title="">Politica Cookies</a></li>
          <li><a href="#" title="">ANPC</a></li>
        </ul>
      </div>
    </footer>

    <script src="js/jquery.min.js"></script>
    <script src="js/form-validation.js"></script>
  </body>
</html>
